name: cloud_power_salesman

description: Cloud Power Salesman Distribution Application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # =========================
  # STATE MANAGEMENT
  # =========================

  flutter_riverpod: ^3.0.0

  # =========================
  # ROUTING
  # =========================

  go_router: ^17.0.0
  flutter_web_plugins:
    sdk: flutter

  # =========================
  # FIREBASE
  # =========================

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.2
  firebase_messaging: ^16.0.0

  # =========================
  # LOCATION + MAPS
  # =========================

  geolocator: ^14.0.0
  google_maps_flutter: ^2.12.3
  maps_launcher: ^3.0.0+1

  # =========================
  # IMAGE
  # =========================

  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0
  flutter_image_compress: ^2.4.0

  # =========================
  # LOCAL STORAGE
  # =========================

  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # =========================
  # OFFLINE DATABASE
  # =========================

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =========================
  # UTILITIES
  # =========================

  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.5

  # =========================
  # PERMISSIONS
  # =========================

  permission_handler: ^12.0.1

  # =========================
  # NOTIFICATIONS
  # =========================

  flutter_local_notifications: ^19.4.0

  # =========================
  # UI
  # =========================

  shimmer: ^3.0.0
  lottie: ^3.3.1

  # =========================
  # APP CONFIG
  # =========================

  package_info_plus: ^8.3.0

  # =========================
  # APP ICONS
  # =========================

  flutter_launcher_icons: ^0.14.4

  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
  - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

  web:
    generate: true
    image_path: "assets/images/logo.png"